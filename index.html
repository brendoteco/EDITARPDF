<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor Profissional - Edição Visual Fiel</title>
    
    <!-- PDF.js para renderização precisa -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    
    <!-- html2canvas para captura fiel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- jsPDF para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Fabric.js para camada de edição -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            border-bottom: 1px solid #e94560;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
            color: #e94560;
        }
        
        .logo svg {
            width: 28px;
            height: 28px;
        }
        
        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: #e94560;
            border-color: #e94560;
        }
        
        .btn-primary:hover {
            background: #ff6b6b;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Layout Principal */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }
        
        .upload-area {
            border: 2px dashed #e94560;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(233, 69, 96, 0.05);
        }
        
        .upload-area:hover {
            background: rgba(233, 69, 96, 0.1);
            transform: translateY(-2px);
        }
        
        .upload-area input {
            display: none;
        }
        
        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            color: #e94560;
        }
        
        .pages-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .page-thumb {
            background: #0f3460;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .page-thumb.active {
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
        }
        
        .page-thumb canvas {
            width: 100%;
            height: auto;
            border-radius: 4px;
            background: #fff;
        }
        
        .page-number {
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            color: #aaa;
        }
        
        /* Área de Edição */
        .editor-area {
            flex: 1;
            background: #0f0f23;
            position: relative;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }
        
        .canvas-container {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background: #fff;
        }
        
        #pdfCanvas {
            display: block;
        }
        
        #editCanvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: text;
        }
        
        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
        
        /* Ferramentas de Edição */
        .edit-tools {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
        }
        
        .edit-tools.visible {
            display: flex;
        }
        
        .tool-section {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .tool-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .tool-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .tool-btn {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-bottom: 5px;
        }
        
        .tool-btn:hover, .tool-btn.active {
            background: #e94560;
            border-color: #e94560;
        }
        
        .font-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .font-controls input, .font-controls select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #fff;
            font-size: 14px;
        }
        
        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #e94560;
            width: 0%;
            transition: width 0.3s;
        }
        
        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
        }
        
        .zoom-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .zoom-btn:hover {
            background: #e94560;
        }
        
        .zoom-level {
            min-width: 60px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Texto sobre o PDF */
        .text-overlay {
            position: absolute;
            background: transparent;
            border: 1px dashed #e94560;
            padding: 4px;
            cursor: move;
            user-select: none;
            font-family: inherit;
        }
        
        .text-overlay:hover {
            border-style: solid;
            background: rgba(233, 69, 96, 0.1);
        }
        
        .text-overlay.editing {
            background: #fff;
            color: #000;
            border: 2px solid #e94560;
            cursor: text;
            user-select: text;
            outline: none;
            min-width: 100px;
        }
        
        /* Info Panel */
        .info-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #aaa;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-value {
            color: #fff;
            font-weight: 500;
        }
        
        /* Modo de visualização */
        .view-modes {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .mode-btn.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            PDF Editor Pro - Edição Visual Fiel
        </div>
        
        <div class="toolbar">
            <button class="btn" onclick="addText()" id="addTextBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Adicionar Texto
            </button>
            <button class="btn" onclick="toggleEditMode()" id="editModeBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Modo Edição
            </button>
            <button class="btn btn-primary" onclick="exportPDF()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Exportar PDF
            </button>
        </div>
    </header>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Carregando PDF...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".pdf" onchange="handleFileSelect(event)">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div>Clique ou arraste PDF aqui</div>
                <div style="font-size: 11px; color: #888; margin-top: 4px;">Máx. 50MB</div>
            </div>
            
            <div class="info-panel">
                <div class="info-row">
                    <span>Páginas:</span>
                    <span class="info-value" id="pageInfo">0</span>
                </div>
                <div class="info-row">
                    <span>Tamanho:</span>
                    <span class="info-value" id="sizeInfo">-</span>
                </div>
                <div class="info-row">
                    <span>Zoom:</span>
                    <span class="info-value" id="zoomInfo">100%</span>
                </div>
            </div>
            
            <div class="pages-list" id="pagesList"></div>
        </aside>

        <!-- Editor Area -->
        <main class="editor-area" id="editorArea">
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="pdfCanvas"></canvas>
                <canvas id="editCanvas"></canvas>
            </div>
            
            <!-- Ferramentas de Edição -->
            <div class="edit-tools" id="editTools">
                <div class="tool-section">
                    <div class="tool-title">Ferramentas</div>
                    <button class="tool-btn active" onclick="setTool('select')" title="Selecionar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" onclick="setTool('text')" title="Texto">
                        <svg width="18" height="18" viewBox="0 0 24 24" fillBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 7 4 4 20 4 20 7"></polyline>
                            <line x1="9" y1="20" x2="15" y2="20"></line>
                            <line x1="12" y1="4" x2="12" y2="20"></line>
                        </svg>
                    </button>
                </div>
                
                <div class="tool-section">
                    <div class="tool-title">Propriedades do Texto</div>
                    <div class="font-controls">
                        <select id="fontFamily" onchange="updateTextStyle()">
                            <option value="Arial">Arial</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Verdana">Verdana</option>
                        </select>
                        <input type="number" id="fontSize" value="12" min="8" max="72" onchange="updateTextStyle()">
                        <input type="color" id="fontColor" value="#000000" onchange="updateTextStyle()">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-0.1)">−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
        <button class="zoom-btn" onclick="fitToScreen()" title="Ajustar à tela">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
            </svg>
        </button>
    </div>

    <script>
        // Configuração
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5;
        let pages = [];
        let editMode = false;
        let fabricCanvas = null;
        let currentTool = 'select';
        
        const canvas = document.getElementById('pdfCanvas');
        const editCanvas = document.getElementById('editCanvas');
        const ctx = canvas.getContext('2d');
        
        // Inicialização
        window.onload = function() {
            initFabricCanvas();
        };
        
        function initFabricCanvas() {
            fabricCanvas = new fabric.Canvas('editCanvas', {
                isDrawingMode: false,
                selection: true,
                preserveObjectStacking: true
            });
            
            fabricCanvas.on('object:added', function(e) {
                if (e.target.type === 'text' || e.target.type === 'i-text') {
                    e.target.set({
                        borderColor: '#e94560',
                        cornerColor: '#e94560',
                        cornerSize: 8,
                        transparentCorners: false
                    });
                }
            });
        }
        
        // Upload de arquivo
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (file.type !== 'application/pdf') {
                alert('Por favor, selecione um arquivo PDF válido.');
                return;
            }
            
            document.getElementById('sizeInfo').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const typedarray = new Uint8Array(e.target.result);
                loadPDF(typedarray);
            };
            reader.readAsArrayBuffer(file);
        }
        
        // Carregar PDF
        async function loadPDF(data) {
            showLoading('Carregando PDF...');
            
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: data }).promise;
                document.getElementById('pageInfo').textContent = pdfDoc.numPages;
                
                pages = [];
                document.getElementById('pagesList').innerHTML = '';
                
                // Renderizar todas as páginas em miniaturas
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    updateProgress((i / pdfDoc.numPages) * 50);
                    await renderThumbnail(i);
                }
                
                // Mostrar primeira página
                await renderPage(1);
                
                // Habilitar botões
                document.getElementById('addTextBtn').disabled = false;
                document.getElementById('editModeBtn').disabled = false;
                
                hideLoading();
                
                // Selecionar primeira miniatura
                document.querySelector('.page-thumb')?.classList.add('active');
                
            } catch (error) {
                console.error('Erro ao carregar PDF:', error);
                alert('Erro ao carregar o PDF. O arquivo pode estar corrompido.');
                hideLoading();
            }
        }
        
        // Renderizar miniatura
        async function renderThumbnail(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 0.3 });
            
            const thumbCanvas = document.createElement('canvas');
            const thumbCtx = thumbCanvas.getContext('2d');
            thumbCanvas.width = viewport.width;
            thumbCanvas.height = viewport.height;
            
            await page.render({
                canvasContext: thumbCtx,
                viewport: viewport
            }).promise;
            
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'page-thumb';
            thumbDiv.onclick = () => selectPage(pageNum);
            thumbDiv.innerHTML = `
                <canvas width="${viewport.width}" height="${viewport.height}"></canvas>
                <div class="page-number">Página ${pageNum}</div>
            `;
            
            const canvas = thumbDiv.querySelector('canvas');
            canvas.getContext('2d').drawImage(thumbCanvas, 0, 0);
            
            document.getElementById('pagesList').appendChild(thumbDiv);
            pages.push({ page, viewport: page.getViewport({ scale: 1.5 }) });
        }
        
        // Selecionar página
        async function selectPage(pageNum) {
            currentPage = pageNum;
            
            // Atualizar UI
            document.querySelectorAll('.page-thumb').forEach((thumb, idx) => {
                thumb.classList.toggle('active', idx + 1 === pageNum);
            });
            
            await renderPage(pageNum);
        }
        
        // Renderizar página principal (ALTA FIDELIDADE)
        async function renderPage(pageNum) {
            showLoading('Renderizando página...');
            
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: scale });
            
            // Configurar canvas do PDF
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            editCanvas.width = viewport.width;
            editCanvas.height = viewport.height;
            
            // Renderizar com qualidade máxima
            const renderContext = {
                canvasContext: ctx,
                viewport: viewport,
                intent: 'display',
                annotationMode: pdfjsLib.AnnotationMode.ENABLE_FORMS
            };
            
            await page.render(renderContext).promise;
            
            // Resetar canvas de edição
            fabricCanvas.clear();
            fabricCanvas.setWidth(viewport.width);
            fabricCanvas.setHeight(viewport.height);
            
            // Ajustar wrapper
            const wrapper = document.getElementById('canvasWrapper');
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';
            
            hideLoading();
        }
        
        // Modo de edição
        function toggleEditMode() {
            editMode = !editMode;
            const btn = document.getElementById('editModeBtn');
            const tools = document.getElementById('editTools');
            
            if (editMode) {
                btn.classList.add('active');
                btn.style.background = '#e94560';
                tools.classList.add('visible');
                fabricCanvas.selection = true;
                editCanvas.style.pointerEvents = 'auto';
            } else {
                btn.classList.remove('active');
                btn.style.background = '';
                tools.classList.remove('visible');
                fabricCanvas.selection = false;
                editCanvas.style.pointerEvents = 'none';
            }
        }
        
        // Adicionar texto
        function addText() {
            if (!editMode) toggleEditMode();
            
            const text = new fabric.IText('Digite aqui...', {
                left: 100,
                top: 100,
                fontFamily: document.getElementById('fontFamily').value,
                fontSize: parseInt(document.getElementById('fontSize').value),
                fill: document.getElementById('fontColor').value,
                backgroundColor: 'rgba(255,255,255,0.9)',
                padding: 5,
                selectable: true,
                hasControls: true,
                hasBorders: true
            });
            
            fabricCanvas.add(text);
            fabricCanvas.setActiveObject(text);
            text.enterEditing();
            text.selectAll();
        }
        
        // Ferramentas
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tool-btn').classList.add('active');
            
            if (tool === 'text') {
                addText();
            }
        }
        
        // Atualizar estilo do texto selecionado
        function updateTextStyle() {
            const activeObject = fabricCanvas.getActiveObject();
            if (activeObject && (activeObject.type === 'text' || activeObject.type === 'i-text')) {
                activeObject.set({
                    fontFamily: document.getElementById('fontFamily').value,
                    fontSize: parseInt(document.getElementById('fontSize').value),
                    fill: document.getElementById('fontColor').value
                });
                fabricCanvas.renderAll();
            }
        }
        
        // Zoom
        function changeZoom(delta) {
            scale = Math.max(0.5, Math.min(3.0, scale + delta));
            document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
            document.getElementById('zoomInfo').textContent = Math.round(scale * 100) + '%';
            if (pdfDoc) renderPage(currentPage);
        }
        
        function fitToScreen() {
            if (!pdfDoc) return;
            const container = document.getElementById('editorArea');
            const page = pages[currentPage - 1];
            const pageWidth = page.viewport.width / 1.5; // base scale
            scale = (container.clientWidth - 80) / pageWidth;
            scale = Math.max(0.5, Math.min(2.0, scale));
            changeZoom(0); // Atualiza display
        }
        
        // Exportar PDF (ALTA QUALIDADE)
        async function exportPDF() {
            if (!pdfDoc) {
                alert('Nenhum PDF carregado!');
                return;
            }
            
            showLoading('Gerando PDF de alta qualidade...');
            
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    unit: 'pt',
                    compress: false
                });
                
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    updateProgress(((i - 1) / pdfDoc.numPages) * 100);
                    
                    // Renderizar página em alta resolução
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // Alta resolução para exportação
                    
                    const exportCanvas = document.createElement('canvas');
                    const exportCtx = exportCanvas.getContext('2d');
                    exportCanvas.width = viewport.width;
                    exportCanvas.height = viewport.height;
                    
                    // Fundo branco
                    exportCtx.fillStyle = '#FFFFFF';
                    exportCtx.fillRect(0, 0, viewport.width, viewport.height);
                    
                    // Renderizar PDF
                    await page.render({
                        canvasContext: exportCtx,
                        viewport: viewport,
                        background: 'white'
                    }).promise;
                    
                    // Se for página atual, adicionar edições do fabric.js
                    if (i === currentPage && fabricCanvas.getObjects().length > 0) {
                        // Clonar canvas de edição em alta res
                        const editData = fabricCanvas.toDataURL({
                            multiplier: 2.0 / scale, // Ajustar para escala de exportação
                            format: 'png',
                            backgroundColor: 'transparent'
                        });
                        
                        const img = await loadImage(editData);
                        exportCtx.drawImage(img, 0, 0, viewport.width, viewport.height);
                    }
                    
                    // Adicionar ao PDF
                    const imgData = exportCanvas.toDataURL('image/jpeg', 0.95);
                    
                    if (i > 1) pdf.addPage();
                    
                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const pageHeight = pdf.internal.pageSize.getHeight();
                    
                    // Calcular dimensões mantendo proporção
                    const imgWidth = viewport.width;
                    const imgHeight = viewport.height;
                    const ratio = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);
                    
                    const finalWidth = imgWidth * ratio;
                    const finalHeight = imgHeight * ratio;
                    const x = (pageWidth - finalWidth) / 2;
                    const y = (pageHeight - finalHeight) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
                }
                
                pdf.save('documento_editado.pdf');
                hideLoading();
                
            } catch (error) {
                console.error('Erro na exportação:', error);
                alert('Erro ao exportar PDF. Tente novamente.');
                hideLoading();
            }
        }
        
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }
        
        // Utilitários
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
            document.getElementById('progressFill').style.width = '0%';
        }
        
        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }
        
        // Drag and drop
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                document.getElementById('sizeInfo').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                const reader = new FileReader();
                reader.onload = (e) => loadPDF(new Uint8Array(e.target.result));
                reader.readAsArrayBuffer(file);
            }
        });
        
        // Atalhos de teclado
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    exportPDF();
                }
                if (e.key === 'e') {
                    e.preventDefault();
                    toggleEditMode();
                }
            }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObject = fabricCanvas.getActiveObject();
                if (activeObject && editMode) {
                    fabricCanvas.remove(activeObject);
                }
            }
        });
    </script>
</body>
</html>
